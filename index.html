<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Aether Studio // USW</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome to Aether</h1>
            <p class="auth-subtitle">Sign in to access your workspace</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Username or Email" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
        </div>

        <div class="auth-buttons">
            <button onclick="handleAuth('login')">Sign In</button>
            <button onclick="handleAuth('signup')" class="secondary">Create Account</button>
        </div>
        <p id="auth-msg" style="color:#ff6b6b; font-size:11px; margin-top:8px; text-align:center; font-family: var(--font-sans); letter-spacing: 0.02em;"></p>
    </div>
</div>

<header class="aether-nav">
    <div class="nav-left">
        <div class="brand">USW NETWORK</div>
        <div id="output-stream" class="terminal-mini">System ready.</div>
    </div>
    <div id="runtime-controls" class="hidden">
        <button class="action-btn" onclick="runCode()">Run Code</button>
        <button class="action-btn" onclick="deployToGithub()">Save Changes</button>
        <button class="close-icon" onclick="backToMenu()">✕</button>
    </div>
</header>

<main id="dashboard">
    <aside class="sidebar">
        <div class="sidebar-label">RECENT PROJECTS</div>
        <div id="saved-files-list"></div>
    </aside>
    <div class="list-container">
        <div class="list-header">START A NEW WORKSPACE</div>
        <div class="list-item" onclick="launchIDE('html', true)"><span class="title">HTML / CSS</span></div>
        <div class="list-item" onclick="launchIDE('javascript', true)"><span class="title">JavaScript</span></div>
        <div class="list-item" onclick="launchIDE('python', true)"><span class="title">Python 3</span></div>
    </div>
</main>

<div id="editor-stage" class="hidden">
    <div id="monaco-canvas"></div>
</div>

<script src="storage.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="script.js"></script>
</body>
</html>
